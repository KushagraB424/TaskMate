{% extends "admin/base.html" %}

{% block title %}{{ title }} | TaskMates Admin Portal{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">TaskMates Admin Portal</a></h1>
{% endblock %}

{% block nav-global %}
{% endblock %}

{% block extrahead %}
{{ block.super }}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (window.location.pathname === '/admin/') {
            var contentMain = document.getElementById('content-main');
            
            if (contentMain) {
                var analyticsDiv = document.createElement('div');
                analyticsDiv.innerHTML = `
                    <div style="background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 20px; padding: 20px;">
                        <h2 style="margin-top: 0; color: #4e73df; font-weight: bold; border-bottom: 1px solid #eaecf4; padding-bottom: 10px;">Platform Analytics & Events Dashboard</h2>
                        
                        <div style="display: flex; gap: 20px; margin-top: 20px;">
                            <div style="flex: 1; min-width: 0; text-align: center;">
                                <h4 style="color: #5a5c69; margin-bottom: 15px;">Bookings by Status</h4>
                                <div style="position: relative; height: 250px; width: 100%;">
                                    <canvas id="statusChart"></canvas>
                                </div>
                            </div>
                            <div style="flex: 1; min-width: 0; text-align: center;">
                                <h4 style="color: #5a5c69; margin-bottom: 15px;">Bookings by Service Type</h4>
                                <div style="position: relative; height: 250px; width: 100%;">
                                    <canvas id="serviceChart"></canvas>
                                </div>
                            </div>
                        </div>

                        <div style="display: flex; gap: 20px; margin-top: 30px;">
                            <div style="flex: 1; min-width: 0; text-align: center;">
                                <h4 style="color: #5a5c69; margin-bottom: 15px;">Platform Users by Role</h4>
                                <div style="position: relative; height: 250px; width: 100%;">
                                    <canvas id="roleChart"></canvas>
                                </div>
                            </div>
                            <div style="flex: 1; min-width: 0; text-align: center;">
                                <h4 style="color: #5a5c69; margin-bottom: 15px;">Average Rating by Provider</h4>
                                <div style="position: relative; height: 250px; width: 100%;">
                                    <canvas id="ratingChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                contentMain.insertBefore(analyticsDiv, contentMain.firstChild);

                fetch('/admin-analytics/')
                    .then(response => response.json())
                    .then(data => {
                        // Render Status Chart
                        new Chart(document.getElementById('statusChart'), {
                            type: 'doughnut',
                            data: {
                                labels: data.status_labels,
                                datasets: [{
                                    data: data.status_data,
                                    backgroundColor: ['#f6c23e', '#1cc88a', '#4e73df', '#e74a3b', '#858796']
                                }]
                            },
                            options: { responsive: true, maintainAspectRatio: false }
                        });

                        // Render Service Chart
                        new Chart(document.getElementById('serviceChart'), {
                            type: 'bar',
                            data: {
                                labels: data.service_labels,
                                datasets: [{
                                    label: 'Total Bookings',
                                    data: data.service_data,
                                    backgroundColor: '#4e73df'
                                }]
                            },
                            options: { responsive: true, maintainAspectRatio: false }
                        });

                        // Render Role Chart
                        new Chart(document.getElementById('roleChart'), {
                            type: 'pie',
                            data: {
                                labels: data.role_labels,
                                datasets: [{
                                    data: data.role_data,
                                    backgroundColor: ['#36b9cc', '#1cc88a', '#e74a3b']
                                }]
                            },
                            options: { responsive: true, maintainAspectRatio: false }
                        });

                        // Render Rating Chart
                        new Chart(document.getElementById('ratingChart'), {
                            type: 'bar',
                            data: {
                                labels: data.provider_labels,
                                datasets: [{
                                    label: 'Avg Rating',
                                    data: data.provider_ratings,
                                    backgroundColor: '#f6c23e'
                                }]
                            },
                            options: { 
                                responsive: true, 
                                maintainAspectRatio: false,
                                scales: { y: { beginAtZero: true, max: 5 } }
                            }
                        });
                    });
            }
        }
    });
</script>
{% endblock %}

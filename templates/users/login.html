{% extends "base.html" %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-lg">
                <div class="card-header bg-white text-center py-4">
                    <h3 class="mb-0 fw-bold">Welcome Back</h3>
                    <p class="text-muted mb-0">Login to your TaskMates account</p>
                </div>
                <div class="card-body p-4">
                    {% if form.errors %}
                        <div class="alert alert-danger" role="alert">
                            <strong>Login failed:</strong> Please check your username and password!
                        </div>
                    {% endif %}
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Login</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer bg-white text-center py-3">
                    Don't have an account? <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none">Sign Up</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
